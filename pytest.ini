[pytest]
# Python 3.14 compatibility: the capture plugin's EncodedFile.snap() calls
# seek(0) on a tmpfile that Python 3.14 closes earlier than expected, raising
# "ValueError: I/O operation on closed file" at session teardown.
# Disabling capture avoids the crash; tests still print to the console.
addopts = -p no:capture

# Where to find tests
testpaths = tests

# Custom marker registrations (suppresses PytestUnknownMarkWarning)
markers =
    benchmark: marks tests as benchmark (slow, requires WSL2+PyRosetta)
    slow: marks tests as slow-running
    timeout: marks tests with a timeout value (pytest-timeout)
